<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SOFTEC 2026 AI Hackathon MVP</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&amp;family=Manrope:wght@400;600;800&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#fcf8ff",
                        "surface-tint": "#5148d7",
                        "inverse-on-surface": "#f3effb",
                        "surface-bright": "#fcf8ff",
                        "primary-fixed": "#e3dfff",
                        "surface-dim": "#dcd8e4",
                        "on-background": "#1b1b23",
                        "secondary-fixed": "#89f5e7",
                        "surface-container-low": "#f6f2fe",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-secondary-fixed-variant": "#005049",
                        "primary-container": "#4338ca",
                        "outline-variant": "#c7c4d7",
                        "tertiary-fixed": "#eaddff",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#00201d",
                        "tertiary-container": "#6616d7",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#c3c0ff",
                        "error": "#ba1a1a",
                        "surface-container-high": "#eae6f3",
                        "secondary-container": "#86f2e4",
                        "on-tertiary-fixed-variant": "#5a00c6",
                        "on-primary-container": "#c1beff",
                        "on-tertiary-container": "#d1b9ff",
                        "surface-container-highest": "#e4e1ed",
                        "on-surface-variant": "#464554",
                        "on-primary-fixed-variant": "#372abf",
                        "secondary": "#006a61",
                        "surface": "#fcf8ff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#25005a",
                        "surface-variant": "#e4e1ed",
                        "inverse-surface": "#302f39",
                        "on-tertiary": "#ffffff",
                        "primary": "#2a14b4",
                        "tertiary": "#4b00a7",
                        "on-secondary-container": "#006f66",
                        "on-primary": "#ffffff",
                        "surface-container": "#f0ecf8",
                        "on-primary-fixed": "#100069",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#6bd8cb",
                        "tertiary-fixed-dim": "#d2bbff",
                        "on-surface": "#1b1b23",
                        "outline": "#777586"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; background-color: #fcf8ff; color: #1b1b23; }
        h1, h2, h3, .headline { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }
        .label { font-family: 'Inter', sans-serif; }
        
        /* Custom Input Styling based on Design System */
        .ds-input {
            background-color: #f6f2fe; /* surface-container-low */
            border: none;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .ds-input:focus {
            background-color: #e4e1ed; /* surface-container-highest */
            border-bottom-color: #2a14b4; /* primary */
            outline: none;
            box-shadow: none;
        }
        
        /* Gradient Button */
        .btn-primary {
            background: linear-gradient(135deg, #2a14b4, #4338ca);
            color: #ffffff;
            transition: opacity 0.2s ease;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        /* Secondary Button (Ghost Border) */
        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(199, 196, 215, 0.2); /* outline-variant at 20% */
            color: #2a14b4; /* primary */
        }
        .btn-secondary:hover {
            background: rgba(246, 242, 254, 0.5); /* surface-container-low */
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Header (No nav shell as this is an onboarding/transactional flow) -->
<header class="py-12 flex justify-center items-center w-full">
<div class="flex items-center gap-4">
<img alt="SOFTEC 2026 Logo" class="h-16 w-auto object-contain" data-alt="Abstract geometric logo in deep indigo and teal representing artificial intelligence and cognitive processing" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlE3ioi6KSNViVgY4WGsw0g5j-zXtnG5XXNZ1D9kOAuChT36VBkonqWd4bF7w6Sy35z9nU9j4KXhFlu-qduaJT27mAfJG3oBgcMHoVXNxO7r6vYMqv46-AL7EfbNboCNqn9puXGvZTEmyJfA5xh-TM7qjpHcMNC9ODspSnu8iDPcQXQzMGSt4GIDtHp7fF6Dcy3L_FjlWzgq77sgWtA0-BcecuYuobXhH-Y5bemI3ZgVYIjUWvBIhGle4DLe6BesgdB119jmjVHA"/>
<h1 class="headline text-4xl font-black text-primary tracking-tighter">SOFTEC 2026</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex justify-center pb-24 px-4 sm:px-6 lg:px-8">
<div class="w-full max-w-4xl space-y-12">
<!-- Intro Text -->
<div class="text-center space-y-4 max-w-2xl mx-auto">
<h2 class="headline text-display-lg text-4xl sm:text-5xl font-bold text-on-surface">Curate Your Profile</h2>
<p class="text-on-surface-variant text-lg">Define your parameters to unlock precision-matched opportunities.</p>
</div>
<form class="space-y-12">
<!-- Section 1: Student Profile -->
<section class="bg-surface-container-lowest rounded-xl p-8 sm:p-12">
<div class="mb-8 flex items-center gap-3">
<span class="material-symbols-outlined text-secondary text-3xl" style="font-variation-settings: 'FILL' 1;">person</span>
<h3 class="headline text-2xl font-bold text-on-surface">Student Profile</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Degree/Program -->
<div class="space-y-2">
<label class="label text-sm text-on-surface-variant font-medium block">Degree / Program</label>
<select class="ds-input w-full rounded-lg px-4 py-3 text-on-surface appearance-none cursor-pointer">
<option disabled="" selected="" value="">Select Program</option>
<option>Computer Science</option>
<option>Artificial Intelligence</option>
<option>Data Science</option>
<option>Software Engineering</option>
</select>
</div>
<!-- Semester -->
<div class="space-y-2">
<label class="label text-sm text-on-surface-variant font-medium block">Semester</label>
<select class="ds-input w-full rounded-lg px-4 py-3 text-on-surface appearance-none cursor-pointer">
<option disabled="" selected="" value="">Select Semester</option>
<option>1st - 2nd</option>
<option>3rd - 4th</option>
<option>5th - 6th</option>
<option>7th - 8th</option>
<option>Graduate</option>
</select>
</div>
<!-- CGPA -->
<div class="space-y-2">
<label class="label text-sm text-on-surface-variant font-medium block">Current CGPA</label>
<input class="ds-input w-full rounded-lg px-4 py-3 text-on-surface" max="4.0" min="0" placeholder="e.g. 3.85" step="0.01" type="number"/>
</div>
<!-- Financial Need -->
<div class="space-y-2">
<label class="label text-sm text-on-surface-variant font-medium block">Financial Need Context</label>
<input class="ds-input w-full rounded-lg px-4 py-3 text-on-surface" placeholder="Optional brief context" type="text"/>
</div>
<!-- Skills/Interests -->
<div class="space-y-4 md:col-span-2 mt-4">
<label class="label text-sm text-on-surface-variant font-medium block">Skills &amp; Interests</label>
<div class="flex flex-wrap gap-4">
<label class="flex items-center gap-2 cursor-pointer bg-surface-container-low px-4 py-2 rounded-lg hover:bg-surface-container-high transition-colors">
<input class="form-checkbox text-primary rounded border-none bg-surface-container-highest focus:ring-primary" type="checkbox"/>
<span class="text-on-surface font-medium">Coding</span>
</label>
<label class="flex items-center gap-2 cursor-pointer bg-surface-container-low px-4 py-2 rounded-lg hover:bg-surface-container-high transition-colors">
<input class="form-checkbox text-primary rounded border-none bg-surface-container-highest focus:ring-primary" type="checkbox"/>
<span class="text-on-surface font-medium">Research</span>
</label>
<label class="flex items-center gap-2 cursor-pointer bg-surface-container-low px-4 py-2 rounded-lg hover:bg-surface-container-high transition-colors">
<input class="form-checkbox text-primary rounded border-none bg-surface-container-highest focus:ring-primary" type="checkbox"/>
<span class="text-on-surface font-medium">Leadership</span>
</label>
<label class="flex items-center gap-2 cursor-pointer bg-surface-container-low px-4 py-2 rounded-lg hover:bg-surface-container-high transition-colors">
<input class="form-checkbox text-primary rounded border-none bg-surface-container-highest focus:ring-primary" type="checkbox"/>
<span class="text-on-surface font-medium">Design</span>
</label>
</div>
</div>
<!-- Preferred Opportunity Types -->
<div class="space-y-4 md:col-span-2 mt-4">
<label class="label text-sm text-on-surface-variant font-medium block">Preferred Opportunity Types</label>
<div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
<label class="flex items-center gap-2 cursor-pointer p-3 rounded-lg bg-surface-container-low border border-transparent hover:border-outline-variant/20 transition-all">
<input class="form-checkbox text-secondary rounded border-none bg-surface-container-highest focus:ring-secondary" type="checkbox"/>
<span class="text-sm font-medium text-on-surface">Scholarships</span>
</label>
<label class="flex items-center gap-2 cursor-pointer p-3 rounded-lg bg-surface-container-low border border-transparent hover:border-outline-variant/20 transition-all">
<input class="form-checkbox text-secondary rounded border-none bg-surface-container-highest focus:ring-secondary" type="checkbox"/>
<span class="text-sm font-medium text-on-surface">Internships</span>
</label>
<label class="flex items-center gap-2 cursor-pointer p-3 rounded-lg bg-surface-container-low border border-transparent hover:border-outline-variant/20 transition-all">
<input class="form-checkbox text-secondary rounded border-none bg-surface-container-highest focus:ring-secondary" type="checkbox"/>
<span class="text-sm font-medium text-on-surface">Competitions</span>
</label>
<label class="flex items-center gap-2 cursor-pointer p-3 rounded-lg bg-surface-container-low border border-transparent hover:border-outline-variant/20 transition-all">
<input class="form-checkbox text-secondary rounded border-none bg-surface-container-highest focus:ring-secondary" type="checkbox"/>
<span class="text-sm font-medium text-on-surface">Admissions</span>
</label>
<label class="flex items-center gap-2 cursor-pointer p-3 rounded-lg bg-surface-container-low border border-transparent hover:border-outline-variant/20 transition-all">
<input class="form-checkbox text-secondary rounded border-none bg-surface-container-highest focus:ring-secondary" type="checkbox"/>
<span class="text-sm font-medium text-on-surface">Fellowships</span>
</label>
</div>
</div>
<!-- Location Preference -->
<div class="space-y-4 md:col-span-2 mt-4">
<label class="label text-sm text-on-surface-variant font-medium block">Location Preference</label>
<div class="flex gap-6">
<label class="flex items-center gap-2 cursor-pointer">
<input class="form-radio text-primary border-none bg-surface-container-highest focus:ring-primary" name="location" type="radio"/>
<span class="text-on-surface">Remote</span>
</label>
<label class="flex items-center gap-2 cursor-pointer">
<input class="form-radio text-primary border-none bg-surface-container-highest focus:ring-primary" name="location" type="radio"/>
<span class="text-on-surface">Local</span>
</label>
<label class="flex items-center gap-2 cursor-pointer">
<input checked="" class="form-radio text-primary border-none bg-surface-container-highest focus:ring-primary" name="location" type="radio"/>
<span class="text-on-surface">Any</span>
</label>
</div>
</div>
<!-- Past Experience -->
<div class="space-y-2 md:col-span-2 mt-4">
<label class="label text-sm text-on-surface-variant font-medium block">Past Experience Snapshot</label>
<textarea class="ds-input w-full rounded-lg px-4 py-3 text-on-surface resize-none" placeholder="Highlight key projects, hackathons, or relevant experience..." rows="4"></textarea>
</div>
</div>
</section>
<!-- Section 2: Opportunity Emails -->
<section class="bg-surface-container-low rounded-xl p-8 sm:p-12 relative overflow-hidden">
<!-- Subtle background decoration -->
<div class="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
<div class="relative z-10">
<div class="mb-8 flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">mail</span>
<h3 class="headline text-2xl font-bold text-on-surface">Opportunity Data Source</h3>
</div>
<button class="btn-secondary px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-semibold" type="button">
<span class="material-symbols-outlined text-sm">upload_file</span>
                                Upload File
                            </button>
</div>
<div class="space-y-2">
<label class="label text-sm text-on-surface-variant font-medium block">Paste Email Content or Lists</label>
<textarea class="w-full bg-surface-container-highest border-none rounded-xl px-6 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary transition-all resize-y" placeholder="Paste text here for AI extraction and matching..." rows="8"></textarea>
</div>
<p class="text-xs text-on-surface-variant mt-3 label">Supported formats for text ingestion: plain text, CSV formats, raw email body.</p>
</div>
</section>
<!-- Submit Action -->
<div class="pt-8 flex justify-end">
<button class="btn-primary px-8 py-4 rounded-full text-lg font-bold flex items-center gap-3 shadow-lg shadow-primary/20" type="submit">
                        Submit Profile and Emails
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
</body></html>
